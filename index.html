<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A premium project-building website for diploma and engineering CSE students with package selection, trusted visuals, and email submissions."
    />
    <meta name="theme-color" content="#0f172a" />
    <script>
      (function () {
        try {
          const stored = localStorage.getItem('project-studio-theme');
          const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const theme = stored === 'light' || stored === 'dark' ? stored : systemDark ? 'dark' : 'light';
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (error) {}
      })();
    </script>
    <title>Project Studio | CSE Final-Year Builds</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
